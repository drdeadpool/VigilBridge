services:
  - type: web
    name: vigil-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vigil-postgres
          property: connectionString
      - key: INGEST_API_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: vigil-postgres
    databaseName: vigil
    plan: free
